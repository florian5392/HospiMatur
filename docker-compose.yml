version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: hospiconnect_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ${DB_NAME:-hospiconnect}
      MYSQL_USER: ${DB_USER:-hospiconnect_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hospiconnect_pass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-hospiconnect_user}", "-p${DB_PASSWORD:-hospiconnect_pass}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mysql_data:
